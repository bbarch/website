name: HTML & CSS Validation

on:
  push:
    branches: [main, beta, develop]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - name: Install vnu wrapper
        run: pip install html5validator
      - name: Validate HTML
        # CSS checking skipped: vnu's CSS engine predates modern properties
        # (inset, padding-block, variable font weights) and reports false errors.
        run: html5validator --root . --blacklist bbarch2_download fonts
